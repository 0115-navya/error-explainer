{% extends 'base.html' %}
{% block content %}

<div class="container  d-flex justify-content-center align-items-center">
    <div class="col-md-5 ">
        <div class="card p-4 shadow">

            <h4 class="mb-1 fw-bold text-center">Welcome Back 👋</h4>
            <p class="text-muted text-center mb-4" style="font-size:0.9rem;">
                Login to continue explaining errors
            </p>
            
            <form method="POST">
                {% csrf_token %}
                <label class="form-label text-muted" style="font-size:0.85rem;">Username</label>
                <input type="text" name="username" class="form-control mb-3" placeholder="Enter your username">

                <label class="form-label text-muted" style="font-size:0.85rem;">Password</label>
                <input type="password" name="password" class="form-control mb-4" placeholder="Enter your password">

                <button type="submit" class="btn btn-success w-100 py-2">
                    Login →
                </button>
            </form>

            <p class="text-center mt-3 text-muted" style="font-size:0.9rem;">
                No account? 
                <a href="/register/" style="color:#58a6ff;">Create one free</a>
            </p>

        </div>
    </div>
</div>

{% endblock %}
