<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔍</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Explainer </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { background-color: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #161b22 !important; border-bottom: 1px solid #30363d; padding: 12px 0; }
        .navbar-brand { font-size: 1.3rem; font-weight: 700; color: #58a6ff !important; }
        .card { background-color: #161b22; border: 1px solid #30363d; color: #e6edf3; border-radius: 12px; }
        .btn-primary { background-color: #238636; border-color: #238636; font-weight: 600; }
        .btn-primary:hover { background-color: #2ea043; border-color: #2ea043; }
        textarea, input { background-color: #0d1117 !important; color: #e6edf3 !important; border-color: #30363d !important; border-radius: 8px !important; }
        textarea:focus, input:focus { border-color: #58a6ff !important; box-shadow: 0 0 0 3px rgba(88,166,255,0.15) !important; }
        p, h1, h2, h3, h4, h5, h6, span, div, li { color: #e6edf3; }
        .text-muted { color: #8b949e !important; }
        strong { color: #ffffff; }
        .badge { font-size: 0.8rem; padding: 6px 12px; border-radius: 20px; }
        .nav-btn { border-radius: 8px; font-size: 0.85rem; padding: 6px 14px; }
        .alert { border-radius: 10px; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"> 🔍Error Explainer</a>
        {% if user.is_authenticated %}
        <div class="d-flex align-items-center gap-2">
            <span class="text-muted" style="font-size:0.85rem">👋 {{ user.username }}</span>
            <a href="/" class="btn btn-outline-secondary btn-sm nav-btn">🏠 Home</a>
            <a href="/history/" class="btn btn-outline-info btn-sm nav-btn">📜 History</a>
            <a href="/logout/" class="btn btn-outline-danger btn-sm nav-btn">Logout</a>
        </div>
        {% endif %}
    </div>
</nav>
<div class="container pb-5">
    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
